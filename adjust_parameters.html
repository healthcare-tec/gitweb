<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adjust Simulation Parameters</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/10.6.4/math.min.js"></script>
    <script src="vis-network.min.js"></script>
    <script src="chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; }
        canvas { width: 80%; max-width: 800px; margin-top: 20px; }
        #processInfo { margin-top: 20px; text-align: left; width: 80%; margin: auto; }
        .process-box { border: 1px solid gray; padding: 10px; margin: 10px; }
        button { margin: 10px; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Adjust Simulation Parameters</h2>
    <p id="userInfo"></p>
    <canvas id="monteCarloChartBase"></canvas>
    <canvas id="monteCarloChartAdjusted" style="position: absolute; top: 0; left: 0; opacity: 0.6;"></canvas>
    <div id="processInfo"></div><button id="sendReport" onclick="sendReport()">Send Report</button>

<script>
    let processes = [];
    let connections = [];
    let originalResults = [];
    let adjustedResults = [];
    
    function loadUserData() {
        const urlParams = new URLSearchParams(window.location.search);
        let macroProcessName = urlParams.get("macroProcessName");
        let establishmentType = urlParams.get("establishmentType");
        let cnpj = urlParams.get("cnpj");
        let email = urlParams.get("email");
        let dataParam = urlParams.get("data");
        
        if (dataParam) {
            let parsedData = JSON.parse(decodeURIComponent(dataParam));
            processes = parsedData.processes;
            connections = parsedData.connections;
        } else {
            alert("No process data received. Please start from the validation page.");
            return;
        }
        
        document.getElementById("userInfo").innerHTML = `
            <strong>Macro Process:</strong> ${macroProcessName} <br>
            <strong>Type:</strong> ${establishmentType} <br>
            <strong>CNPJ:</strong> ${cnpj} <br>
            <strong>Email:</strong> ${email}
        `;
        
        renderProcessInfo();
        runSimulation();
    }
    
    function renderProcessInfo() {
        const container = document.getElementById("processInfo");
        container.innerHTML = "<h3>Process Flow Information</h3>";
        processes.forEach(({ id, label, min, avg, goal, parallel }) => {
            const div = document.createElement("div");
            div.className = "process-box";
            div.innerHTML = `
                <strong>${label}</strong><br>
                Min Time: ${min} min<br>
                Avg Time: ${avg} min<br>
                Goal Time: ${goal} min<br>
                Parallel Processes: ${parallel}
            `;
            container.appendChild(div);
        });
    }
    
    function runSimulation() {
        let simulations = 1000;
        originalResults = runMonteCarlo(simulations, processes);
        adjustedResults = [...originalResults];
        plotResults();
    }

    function runMonteCarlo(simulations, processList) {
        let results = [];
        for (let i = 0; i < simulations; i++) {
            let totalTime = 0;
            processList.forEach(proc => {
                let sigma = (proc.avg - proc.min) / 5;
                let time = normalDistribution(proc.avg, sigma);
                totalTime += time / proc.parallel;
            });
            results.push(totalTime);
        }
        return results;
    }

    function plotResults() {
        let ctxBase = document.getElementById("monteCarloChartBase").getContext("2d");
        let ctxAdj = document.getElementById("monteCarloChartAdjusted").getContext("2d");
        let bins = 20;
        let labels = generateBins(originalResults, bins);
        
        new Chart(ctxBase, {
            type: "bar",
            data: { labels, datasets: [{ label: "Original", data: binData(originalResults, bins), backgroundColor: "rgba(75, 192, 192, 0.6)" }] }
        });
        
        new Chart(ctxAdj, {
            type: "bar",
            data: { labels, datasets: [{ label: "Adjusted", data: binData(adjustedResults, bins), backgroundColor: "rgba(255, 99, 132, 0.4)" }] }
        });
    }
    
    function sendReport() {
        let urlParams = new URLSearchParams(window.location.search);
        let userEmail = urlParams.get("email");
        alert(`Report sent to ${userEmail} and a copy to cadastro@outlook.com`);
    }
    
    window.onload = function() {
        loadUserData();
    };
</script>

</body>
</html>
